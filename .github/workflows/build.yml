name: Build Roboquix (Win & Linux)
on:
  push:
    paths:
      - 'version_info.txt'
      - '.github/workflows/build.yml'

jobs:
  build:
    strategy:
      matrix:
        # We only run on Windows and Ubuntu (Linux)
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux Only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 libsdl2-ttf-2.0-0

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m venv venv
          # Use different activation paths for Windows vs Linux
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          python -m pip install --upgrade pip
          pip install pygame-ce==2.5.7 pyinstaller arabic-reshaper python-bidi requests Pillow

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          pyinstaller platformer.spec

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Roboquix-${{ matrix.os }}
          path: dist/
          
      - name: Print Analysis Summary
        run: |
            cat build/my_script/warn-my_script.txt || true
