name: Build Roboquix (Win & Linux)
on:
  push:
    paths:
      - 'version_info.txt'
      - '.github/workflows/build.yml'

jobs:
  build:
    strategy:
      matrix:
        # We only run on Windows and Ubuntu (Linux)
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install pygame-ce==2.5.7 pyinstaller arabic-reshaper python-bidi requests Pillow
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            # Only install the absolute necessary runtime libraries if possible
            sudo apt-get install -y libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 libsdl2-ttf-2.0-0
          fi

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          pyinstaller platformer.spec
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Roboquix-${{ matrix.os }}
          path: dist/
